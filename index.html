<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polish For You</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="comic-section">

    <!-- LESSON 1 -->
    <div class="comic-card">

        <div class="comic-content">
            <div class="comic-tag">POLISH FOR YOU</div>

            <h2 class="comic-title">
                First Lesson
            </h2>

            <p class="comic-description">
                Meet your new buddy discovering Poland with you.
                Learn language, culture and fun expressions through
                comics and stories.
            </p>

            <div class="comic-button">
                <a href="#">Start Reading</a>
            </div>
        </div>

        <div class="comic-image">
            <img src="images/polish_1.jpg" alt="Lesson 1">
        </div>

    </div>

    <!-- LESSON 2 -->
    <div class="comic-card reverse">

        <div class="comic-content">
            <div class="comic-tag">NEW EPISODE</div>

            <h2 class="comic-title">
                Lesson 2
            </h2>

            <p class="comic-description">
                Continue the adventure with more expressions,
                real-life situations and funny moments in Poland.
            </p>

            <div class="comic-button">
                <a href="#">Continue</a>
            </div>
        </div>

        <div class="comic-image">
            <img src="images/polish_2.jpg" alt="Lesson 2">
        </div>

    </div>

</div>

</body>
</html>
